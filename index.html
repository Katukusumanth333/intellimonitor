<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IntelliMonitor</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#07080d"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #07080d;
      color: #e2e8f0;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
    }
    .logo {
      width: 80px; height: 80px;
      background: linear-gradient(135deg, #3b82f6, #22d3a4);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 40px; margin-bottom: 20px;
    }
    h1 { font-size: 28px; margin-bottom: 10px; color: #3b82f6; }
    p  { font-size: 14px; color: #7a8fab; max-width: 300px; line-height: 1.6; }
    .badge {
      margin-top: 20px;
      background: #22d3a418;
      border: 1px solid #22d3a440;
      color: #22d3a4;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 12px;
    }
    .stats {
      display: flex; gap: 30px; margin-top: 30px;
    }
    .stat { text-align: center; }
    .stat-val { font-size: 22px; font-weight: 800; color: #22d3a4; }
    .stat-lbl { font-size: 10px; color: #7a8fab; text-transform: uppercase; }
  </style>
</head>
<body>
  <div class="logo">⬡</div>
  <h1>IntelliMonitor</h1>
  <p>Intelligent Mobile Application for Real-Time Data Monitoring & Analytics</p>
  <div class="badge">● Live — No Hardware Required</div>
  <div class="stats">
    <div class="stat"><div class="stat-val">99.8%</div><div class="stat-lbl">Faster</div></div>
    <div class="stat"><div class="stat-val">−94%</div><div class="stat-lbl">Manual Effort</div></div>
    <div class="stat"><div class="stat-val">99.97%</div><div class="stat-lbl">Uptime</div></div>
  </div>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js')
        .then(() => console.log('SW registered'))
        .catch(e => console.log('SW error', e));
    }
  </script>
</body>
</html>
